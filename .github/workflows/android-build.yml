name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'crates/**'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'android/**'
      - 'crates/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle.kts') }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust for Android
        run: |
          cargo ndk \
            --target aarch64-linux-android \
            --target armv7-linux-androideabi \
            --target x86_64-linux-android \
            --platform 26 \
            --output-dir android/app/src/main/jniLibs \
            -- build --package drop-ffi --release

      - name: Generate Kotlin bindings
        run: |
          cargo run --package uniffi-bindgen -- generate \
            --library target/aarch64-linux-android/release/libdrop_ffi.so \
            --language kotlin \
            --out-dir android/app/src/main/java/uniffi/drop_ffi \
            --no-format

      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drop-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: drop-debug-apk

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.sha.outputs.short }}
          name: "Dev Build ${{ steps.sha.outputs.short }}"
          body: |
            Automated dev build from `main` branch.

            **Install:** Download `app-debug.apk` and sideload on your Android device.
            ```
            adb install app-debug.apk
            ```
          prerelease: true
          files: app-debug.apk
