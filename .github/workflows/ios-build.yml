name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'crates/**'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'ios/**'
      - 'crates/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust core for iOS simulator
        run: cargo build --package drop-ffi --target aarch64-apple-ios-sim

      - name: Build iOS app (simulator)
        working-directory: ios/Drop
        run: |
          xcodebuild build \
            -project Drop.xcodeproj \
            -scheme Drop \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20
